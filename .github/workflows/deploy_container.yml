name: Deploy container to cloud

on:
    # Only trigger this workflow when it is called or manually executed  
    workflow_dispatch:
    workflow_call:

env:
    IMAGE_NAME: ${{ github.repository }}
    REGISTRY: ghcr.io

jobs:
    deploy-container-to-cloud:
        runs-on: ubuntu-latest

        permissions:
          id-token: write # required for requesting JWT from Github OIDC provider
          contents: read

        env:
            AWS_REGION: ap-southeast-2
            ECR_REPOSITORY: cinecritic-frontend
            ECS_CLUSTER: cinecritic-cluster
            ECS_SERVICE: cinecritic-frontend-launcher
            ECS_TASK_DEFINITION: task-definition.json
            CONTAINER_NAME: cinecritic-frontend-app

        steps:
            - name: Checkout the latest version of the code
              uses: actions/checkout@v6

            - name: Configure aws credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                aws-region: ${{ env.AWS_REGION }}
            
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a

            - name: Verify aws identity
              run: aws sts get-caller-identity

            - name: Build, tag, and push docker image to Amazon ECR
              id: build-image
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                IMAGE_TAG: ${{ github.sha }}
              run:
                # Build the docker container and push it to Amazon ECR
                docker compose down --remove-orphans 
                docker compose build --no-cache -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
                docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

            - name: Fill in the new image id in the amazon ecs task definition
              id: task-definer
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                task-definition: ${{ env.ECS_TASK_DEFINITION }}
                container-name: ${{ env.CONTAINER_NAME }}
                image: ghcr.io/${{ github.repository }}:latest

            - name: Deploy amazon ecs task definition
              uses: aws-actions/amazon-ecs-deploy-task-definition@v2
              with:
                task-definition: ${{ steps.task-definer.outputs.task-definition }}
                service: ${{ env.ECS_SERVICE }}
                cluster: ${{ env.ECS_CLUSTER }}
                wait-for-service-stability: true