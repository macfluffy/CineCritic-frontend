name: Test code

on:
    # Only trigger this workflow when it is called
    workflow_call:

jobs:
    test:
        name: Testing the code
        runs-on: ubuntu-latest

        steps:
            - name: Checkout the latest version of the code
              uses: actions/checkout@v6

            - name: Setup environment
              uses:  actions/setup-node@v4.0.3
              with:
                node-version: "24"
                cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run the test
              run: npm run test > report.txt

            - name: Archive the test report
              uses: actions/upload-artifact@v7.0.0
              with:
                name: test_report
                path: ../testlogs/test_report.txt